<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Studio Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; }
        canvas { display: block; }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loader {
            border: 4px solid #334155;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div class="fixed top-6 left-6 z-50 glass p-6 rounded-2xl w-80 shadow-2xl">
        <h1 class="text-xl font-bold mb-1 text-sky-400">3D Studio</h1>
        <p class="text-xs text-slate-400 mb-6">GLTF / GLB Viewer</p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2 text-slate-200">Local Fetch Address</label>
                <input type="text" id="local-path-input" placeholder="models/scene.glb" 
                    class="w-full bg-slate-900/50 border border-white/10 rounded-lg px-3 py-2 text-sm text-sky-200 focus:outline-none focus:border-sky-500 mb-2"
                    value="models/scene.glb">
                
                <button id="load-default" class="w-full py-2 px-4 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                    Fetch from Path
                </button>
            </div>

            <div class="pt-4 border-t border-white/5">
                <label class="block text-sm font-medium mb-2 text-slate-200">Direct Upload</label>
                <div class="relative group">
                    <input type="file" id="model-upload" accept=".glb, .gltf" class="hidden">
                    <label for="model-upload" class="cursor-pointer w-full py-3 px-4 bg-sky-600 hover:bg-sky-500 rounded-lg text-sm font-semibold transition-all flex items-center justify-center gap-2 shadow-lg shadow-sky-900/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                        Select File
                    </label>
                </div>
            </div>
        </div>

        <div class="mt-8 pt-4 border-t border-white/5 space-y-2">
            <div class="flex justify-between text-[10px] text-slate-400">
                <span>Orbit: Left Mouse</span>
                <span>Zoom: Scroll</span>
            </div>
            <div class="flex justify-between text-[10px] text-slate-400">
                <span>Pan: Right Mouse</span>
                <span>Reset View: Space</span>
            </div>
        </div>
    </div>

    <!-- Loading Indicator -->
    <div id="loading-overlay">
        <div class="loader mb-4"></div>
        <div id="loading-text" class="text-sky-400 font-mono text-sm uppercase tracking-widest font-bold">Initializing...</div>
        <div id="progress-bar-container" class="w-48 h-1 bg-slate-800 rounded-full mt-4 overflow-hidden">
            <div id="progress-bar" class="w-0 h-full bg-sky-400 transition-all duration-300"></div>
        </div>
    </div>

    <!-- Info Toast -->
    <div id="toast" class="fixed bottom-6 right-6 glass px-6 py-3 rounded-full opacity-0 translate-y-4 transition-all duration-500 z-50 text-sm pointer-events-none">
        Action Successful
    </div>

    <!-- Three.js Setup -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.162.0/three.module.min.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // --- Core Variables ---
        let scene, camera, renderer, controls, loader, model;
        const loadingOverlay = document.getElementById('loading-overlay');
        const progressBar = document.getElementById('progress-bar');
        const loadingText = document.getElementById('loading-text');
        const toast = document.getElementById('toast');

        init();
        animate();

        function init() {
            // 1. Scene & Renderer
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            // 2. Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);

            // 3. Environment & Lighting
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const directLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directLight.position.set(5, 10, 7.5);
            scene.add(directLight);

            // 4. Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // 5. Grid Helper
            const grid = new THREE.GridHelper(20, 20, 0x1e293b, 0x1e293b);
            scene.add(grid);

            // 6. Loader Setup
            loader = new GLTFLoader();

            // --- Event Listeners ---
            
            // Upload Button
            document.getElementById('model-upload').addEventListener('change', handleUpload);
            
            // Load from Path Button
            document.getElementById('load-default').addEventListener('click', () => {
                const path = document.getElementById('local-path-input').value.trim();
                if (path) {
                    loadModel(path);
                } else {
                    alert("Please enter a valid file path or URL.");
                }
            });

            // Resize
            window.addEventListener('resize', onWindowResize);

            // Keyboard Shortcuts
            window.addEventListener('keydown', (e) => {
                if(e.code === 'Space') {
                    controls.reset();
                    fitCameraToModel();
                }
            });
        }

        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            loadModel(url, true);
        }

        function loadModel(url, isBlob = false) {
            loadingOverlay.style.display = 'flex';
            progressBar.style.width = '0%';
            loadingText.innerText = "Connecting to file...";

            loader.load(
                url,
                (gltf) => {
                    // Success
                    if (model) scene.remove(model);
                    
                    model = gltf.scene;
                    scene.add(model);

                    fitCameraToModel();
                    
                    if (isBlob) URL.revokeObjectURL(url);
                    
                    loadingOverlay.style.display = 'none';
                    showToast("Model Loaded!");
                },
                (xhr) => {
                    // Progress tracking
                    if (xhr.lengthComputable) {
                        const percent = (xhr.loaded / xhr.total) * 100;
                        progressBar.style.width = percent + '%';
                        loadingText.innerText = `Downloading: ${Math.round(percent)}%`;
                    } else {
                        loadingText.innerText = "Streaming model data...";
                    }
                },
                (error) => {
                    // Error Handling
                    console.error('Three.js Loading Error:', error);
                    loadingOverlay.style.display = 'none';
                    
                    let errorMsg = "Could not load the model. ";
                    if (window.location.protocol === 'file:') {
                        errorMsg += "Browsers block local file access (CORS) when opening HTML via file://. Please use a local server (like Live Server).";
                    } else {
                        errorMsg += "Ensure the path is correct and the file is a valid .glb or .gltf.";
                    }
                    alert(errorMsg);
                }
            );
        }

        function fitCameraToModel() {
            if (!model) return;

            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // Reset model position to origin
            model.position.x += (model.position.x - center.x);
            model.position.y += (model.position.y - center.y);
            model.position.z += (model.position.z - center.z);
            
            // Adjust to sit on grid
            const newBox = new THREE.Box3().setFromObject(model);
            model.position.y -= newBox.min.y;

            // Frame camera
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
            cameraZ *= 2.2; 

            camera.position.set(cameraZ, cameraZ / 1.5, cameraZ);
            camera.lookAt(0, size.y / 2, 0);
            
            controls.target.set(0, size.y / 2, 0);
            controls.update();
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(1rem)';
            }, 3000);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
